name: Deploy Laravel Backend to cPanel

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - '.github/workflows/deploy-laravel.yml'

jobs:
  deploy:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, mysql, zip

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        working-directory: apps/api

      - name: Cache Composer Dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer Dependencies
        run: |
          cd apps/api
          composer install --no-dev --optimize-autoloader --no-ansi --no-interaction --no-scripts --prefer-dist

      - name: Compress and Prepare Package
        run: |
          cd apps/api
          zip -r ../../release.zip . -x "node_modules/*" "storage/logs/*" ".git/*"
          cd ../..
          mkdir deploy_pkg
          mv release.zip deploy_pkg/
          cp apps/api/extract.php deploy_pkg/

      - name: FTP Upload Package to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_pkg/
          server-dir: /public_html/
          state-name: .ftp-deploy-laravel-state.json

      - name: Trigger Remote Unzip and Extract
        run: |
          echo "Triggering extraction via HTTP curl request..."
          curl -sSf "https://admin.javaorigins.co.nz/extract.php?token=a688b139de88fc90ab1288cde813" || \
          echo "Warning: HTTP trigger failed, please open https://admin.javaorigins.co.nz/extract.php?token=a688b139de88fc90ab1288cde813 in browser to complete deployment."
